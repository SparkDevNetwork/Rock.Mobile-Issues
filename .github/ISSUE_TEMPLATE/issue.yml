name: Issue Report
description: Submit a bug report to help improve Rock Mobile.
labels: [status: unverified]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before You Submit
      options:
        - label: I have read the [submission guidelines](https://github.com/SparkDevNetwork/Rock.Mobile-Issues#readme)
          required: true
        - label: I have reproduced this issue in the Rock Core app
          required: true
  - type: markdown
    attributes:
      value: |
        # Basic Information
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Crash / App closes unexpectedly
        - Visual / UI bug
        - Functional bug
        - Performance issue
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Issue Description
      description: Describe what is happening and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: Provide step-by-step instructions on how to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Tap on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this issue occur?
      options:
        - Always reproducible
        - Sometimes reproducible
        - Happened once
    validations:
      required: true
  - type: textarea
    id: screenshots-video
    attributes:
      label: Screenshots or Videos
      description: Add a screenshot for visual bugs. For issues that require multiple steps to reproduce, a video is strongly encouraged.
    validations:
      required: false
  - type: textarea
    id: reproduction-xaml
    attributes:
      label: Reproduction XAML
      description: If applicable, provide the complete XAML needed to reproduce the issue. Partial snippets will result in a closed issue.
      render: xml
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        # Environment Information
  - type: dropdown
    id: platform
    attributes:
      label: Platform(s) Affected
      options:
        - iOS only
        - Android only
        - Both iOS and Android
    validations:
      required: true
  - type: input
    id: mobile-shell-version
    attributes:
      label: Rock Mobile Shell Version
      description: The version of the Rock Mobile Shell (e.g. v2.0).
    validations:
      required: true
  - type: input
    id: rock-core-version
    attributes:
      label: Rock Core Version
      description: The version of Rock Core your app is connected to (e.g. v17.0).
    validations:
      required: true
  - type: input
    id: last-known-working-version
    attributes:
      label: Last Known Working Version
      description: If applicable, what version last worked correctly?
    validations:
      required: false
  - type: input
    id: device-info
    attributes:
      label: Device(s) and OS Version(s)
      description: List the device(s) and OS version(s) where you reproduced the issue.
      placeholder: "e.g. iPhone 15, iOS 17.2 / Samsung Galaxy S23, Android 14"
    validations:
      required: false
