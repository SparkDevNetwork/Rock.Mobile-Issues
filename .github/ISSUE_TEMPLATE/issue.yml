name: Issue Report
description: Submit a bug report to help improve Rock Mobile.
labels: [status: unverified]
body:
  - type: markdown
    attributes:
      value: |
        > Read the full [submission guidelines](https://github.com/SparkDevNetwork/Rock.Mobile-Issues#readme) before continuing. Incomplete reports will be closed without investigation.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have read the submission guidelines
          required: true
        - label: I have reproduced this issue in the Rock Core app
          required: true
  - type: markdown
    attributes:
      value: |
        # Basic Information
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Crash / App closes unexpectedly
        - Visual / UI bug
        - Functional bug
        - Performance issue
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Issue Description
      description: A clear and concise description of the issue.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction Steps
      description: Provide step-by-step instructions on how to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Tap on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      description: How often does this issue occur?
      options:
        - Always reproducible
        - Sometimes reproducible
        - Happened once
    validations:
      required: true
  - type: textarea
    id: screenshots-video
    attributes:
      label: Screenshots or Videos
      description: Add visuals to help explain the issue. Visual bugs require a full-device screenshot. Step-based bugs require a video.
    validations:
      required: true
  - type: textarea
    id: reproduction-xaml
    attributes:
      label: Reproduction XAML
      description: If applicable, provide the complete XAML needed to reproduce the issue. Partial snippets will result in a closed issue.
      render: xml
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        # Environment Information
  - type: dropdown
    id: platform
    attributes:
      label: Platform(s) Affected
      options:
        - iOS only
        - Android only
        - Both iOS and Android
    validations:
      required: true
  - type: input
    id: mobile-shell-version
    attributes:
      label: Rock Mobile Shell Version
      description: The version of the Rock Mobile Shell (e.g. v2.0).
    validations:
      required: true
  - type: input
    id: rock-core-version
    attributes:
      label: Rock Core Version
      description: The version of Rock Core your app is connected to (e.g. v17.0).
    validations:
      required: true
  - type: input
    id: last-known-working-version
    attributes:
      label: Last Known Working Version
      description: If applicable, what version last worked correctly?
    validations:
      required: false
  - type: input
    id: ios-info
    attributes:
      label: iOS Device Type(s) and iOS Version(s)
      description: What iOS devices and versions are experiencing the issue?
      placeholder: 
    validations:
      required: false
  - type: input
    id: android-info
    attributes:
      label: Android Device Type(s) and Android Version(s)
      description: What Android devices and versions are experiencing the issue?
      placeholder: 
    validations:
      required: false
